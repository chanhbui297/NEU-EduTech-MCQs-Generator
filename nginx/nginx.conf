events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 1000M;
    sendfile        on;
    keepalive_timeout  65;

    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name localhost;

        # ------------------------------------------------
        # CẤU HÌNH CSP MỞ RỘNG (CHO PHÉP TẤT CẢ)
        # ------------------------------------------------
        # Xóa header cũ nếu có để tránh xung đột
        proxy_hide_header Content-Security-Policy;
        
        # Header cho phép unsafe-eval (để sửa lỗi block script) và cho phép upload form
        add_header Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval' data: blob: filesystem: about: ws: wss:; script-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * 'unsafe-inline' data: blob:; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';" always;

        # ------------------------------------------------
        # 1. FRONTEND
        # ------------------------------------------------
        location / {
            proxy_pass http://frontend_web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ------------------------------------------------
        # 2. BACKEND API
        # ------------------------------------------------
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_pass http://backend_api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}